  #   - 周度 refit 推迟到 Phase 2（本 room 不做 CLI / APScheduler 调度）
  #   - FinBERT / Fin-E5 用预训练，不做 fine-tune
  #   - Fin-E5 重要性降级为 embedding infra + rule baseline
  #   - P3: g2_classifier 从私有 FinBERT 实例重构为复用 m2a FinBERTScorer singleton
