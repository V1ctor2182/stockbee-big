spec_id: "intent-01-macro-sources-001"
type: intent
state: active
intent:
  summary: "补充宏观数据源：Polymarket 事件概率 + FRED 经济日历"
  detail: |
    原定义（FRED API + BLS + 美联储 RSS）已被 03-macro-data 完全覆盖：
    - FRED API: FredMacroProvider 17 指标已连通
    - BLS: NFP/UNRATE/CPI/PPI 通过 FRED 镜像获取
    - 美联储 RSS: Tech Design 未明确要求

    重新定义为两个补充数据源：

    1. PolymarketFetcher（市场共识的领先信号）
       - 通过 Gamma API (gamma-api.polymarket.com) 抓取宏观事件概率
       - 两步过滤策略：
         a) 服务端拉取：limit=200, active=true, order=volume desc
         b) 本地关键词过滤：MACRO_KEYWORDS（20 个关键词覆盖货币/经济/贸易/财政）
       - SQLite 历史追踪 + 概率悬崖检测（变化 >= 15%）
       - 作为 MacroTiltEngine 的外生补充因子
       - 例：降息概率从 20% 跳升至 70% → 增加高 duration 金融股权重
       - 必须 User-Agent header（避免 403）
       - 完全免费，无需 API key

    2. EconomicCalendar（高波动事件日历）
       - 通过 FRED Release Dates API 同步经济数据发布日历
       - 标记 8 类高波动事件：FOMC, NFP, CPI, PPI, GDP, Treasury Yield,
         Industrial Production, M2 Money Stock
       - 供 risk control 和 portfolio rebalancing 使用
       - 避免在重大数据发布前后执行再平衡
       - 需要 FRED API key（与 macro-data 共用）

    实现状态：已完成 ✅ + Polymarket API 实测验证（2026-04-09）
    测试覆盖：22 个单元测试
