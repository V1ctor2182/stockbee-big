  detail: |
    完整关键词列表（src/stockbee/macro_sources/polymarket.py:30）：

    美联储/利率（6）：
      "fed ", "federal reserve", "fomc",
      "interest rate", "rate cut", "rate hike"

    经济周期（5）：
      "recession", "inflation", "cpi", "gdp", "unemployment"

    贸易（2）：
