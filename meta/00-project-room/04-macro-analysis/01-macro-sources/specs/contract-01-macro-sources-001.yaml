spec_id: "contract-01-macro-sources-001"
type: contract
state: active
intent:
  summary: "PolymarketFetcher + EconomicCalendar 完整接口约定"
  detail: |
    @dataclass
    class MarketEvent:
        event_id, question, slug: str
        probability, volume, liquidity: float
        previous_probability: float | None
        is_cliff: bool
        fetched_at: str

    class PolymarketFetcher:
        def __init__(db_path, cliff_threshold=0.15)
        def initialize() / shutdown()
        def fetch_macro_events(limit=30) → list[MarketEvent]
        def save_events(events) → int
        def detect_cliffs(events?) → list[MarketEvent]
        def get_latest_events(limit=30) → list[dict]

    @dataclass
    class ReleaseEvent:
        release_id: int
        release_name: str
        release_date: date
        high_volatility: bool

    class EconomicCalendar:
        def __init__(api_key, db_path)
        def initialize() / shutdown()
        def sync(days_ahead=90) → int
        def get_events(start?, end?, high_volatility_only?) → list[ReleaseEvent]
        def is_high_volatility_day(d) → bool
        def get_next_high_volatility(after?) → ReleaseEvent | None
constraints: []
indexing:
  type: contract
  priority: high
  layer: feature
  domain: "quantitative-trading"
  tags: ["api", "interface"]
provenance:
  source_type: implementation
  confidence: 1.0
  source_ref: "src/stockbee/macro_sources/"
relations: []
anchors:
