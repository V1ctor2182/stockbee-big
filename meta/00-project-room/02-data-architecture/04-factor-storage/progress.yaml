      description: |
        参照 parquet_macro.py（234行）。存储路径：data/factors/{group}.parquet。
        group 粒度：按数据来源分组（e.g. fundamental, sentiment, ml_score），每组一文件。
        接口：read_factors(group, tickers, start, end)，write_factors(group, df)（merge-write
