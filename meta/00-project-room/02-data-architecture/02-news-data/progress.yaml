      description: |
        SQLite CRUD、去重逻辑、多条件查询。G1 各过滤条件（黑名单、时间、去重、实体识别）。
        G2 FinBERT mock（情绪输出格式、主题分类覆盖、batch 处理）。
        G3 Haiku mock（触发条件、日限计数、降级）。同步管道 mock 端到端。
